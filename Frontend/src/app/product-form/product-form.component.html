<div class="container">

  <div class="product-card">

    <h2>AI Product Generator</h2>

    <form [formGroup]="productForm">

      <!-- AI Provider Toggle -->
      <div class="form-group">
        <label>Select AI Provider</label>
        <select formControlName="provider">
          <option value="openai">OpenAI</option>
          <option value="grok">Grok AI</option>
        </select>
      </div>
      <!-- Image Upload -->
      <div class="form-group">
        <label>Upload Product Image</label>
        <input type="file" (change)="onFileChange($event)">
      </div>

      <div class="form-group">
        <label>Product Name</label>
        <input type="text" formControlName="name">
      </div>

      <div class="form-group">
        <label>Category</label>
        <input type="text" formControlName="category">
      </div>

      <div class="form-group">
        <label>Brand</label>
        <input type="text" formControlName="brand">
      </div>

      <div class="form-group">
        <label>Features</label>
        <textarea formControlName="features"></textarea>
      </div>

      <div class="form-group">
        <label>Price</label>
        <input type="number" formControlName="price">
      </div>

      <button class="generate-btn" type="button" (click)="generateDescription()">
        Generate Description
      </button>

      <div class="form-group">
        <label>Description</label>
        <textarea rows="6" formControlName="description"></textarea>
      </div>

      <button class="save-btn" type="button" (click)="saveProduct()">
        Save Product
      </button>

    </form>

  </div>

</div>
